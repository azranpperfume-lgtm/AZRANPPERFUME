<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>AZRAN ADMIN</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
    body { background:#000; color:#fff; font-family:Arial; padding: 20px; }
    .gold { color:gold; text-align: center; }
    .box { border:1px solid #333; padding:15px; margin:10px 0; border-radius: 5px; }
    
    /* تنسيق القوائم المنسدلة (المكتبة) */
    select, input, textarea { 
        width: 100%; 
        padding: 10px; 
        margin: 5px 0 15px 0; 
        background: #111; 
        color: #fff; 
        border: 1px solid #444; 
    }
    
    label { color: gold; font-size: 0.9rem; font-weight: bold; }
    
    .order-btn { 
        background: gold; 
        color: black; 
        padding: 10px; 
        border: none; 
        width: 100%; 
        font-weight: bold; 
        cursor: pointer; 
    }
    
    .divider { border-top: 1px solid #333; margin: 15px 0; }
</style>
</head>

<body>

<h1 class="gold">AZRAN ADMIN</h1>

<div class="box">
    <h3 class="gold">تصميم عطرك الخاص</h3>
    
    <label>الاسم:</label>
    <input type="text" id="name" placeholder="أدخل اسمك">

    <label>الهاتف:</label>
    <input type="tel" id="phone" placeholder="أدخل رقمك">

    <label>إفتتاحية العطر (Top Notes):</label>
    <select id="top">
        <option value="غير محدد">-- اختر من المكتبة --</option>
        <option>برغموت</option>
        <option>خزامى</option>
        <option>هيل</option>
        <option>فلفل وردي</option>
    </select>

    <label>قلب العطر (Heart Notes):</label>
    <select id="heart">
        <option value="غير محدد">-- اختر من المكتبة --</option>
        <option>ياسمين</option>
        <option>ورد طائفي</option>
        <option>زعفران</option>
        <option>قرفة</option>
    </select>

    <label>قاعدة العطر (Base Notes):</label>
    <select id="base">
        <option value="غير محدد">-- اختر من المكتبة --</option>
        <option>عود</option>
        <option>مسك</option>
        <option>عنبر</option>
        <option>فانيليا</option>
        <option>خشب الصندل</option>
    </select>

    <label>ملاحظات إضافية:</label>
    <textarea id="notes" rows="2"></textarea>

    <button class="order-btn" onclick="send()">إرسال الطلب</button>
</div>

<div class="divider"></div>
<h2 class="gold">قائمة الطلبات الواردة</h2>

<div id="orders"></div>

<script>
const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_DOMAIN",
    projectId: "YOUR_ID",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// وظيفة إرسال الطلب
function send() {
    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;
    const top = document.getElementById("top").value;
    const heart = document.getElementById("heart").value;
    const base = document.getElementById("base").value;
    const notes = document.getElementById("notes").value;

    if(!name || !phone) return alert("الرجاء كتابة الاسم والهاتف");

    db.collection("orders").add({
        name: name,
        phone: phone,
        product: `القمة: ${top} | القلب: ${heart} | القاعدة: ${base}`,
        notes: notes,
        time: firebase.firestore.FieldValue.serverTimestamp()
    }).then(() => {
        alert("تم الإرسال!");
        location.reload();
    });
}

// وظيفة عرض الطلبات (نفس طريقتك الأصلية)
function load(){
    db.collection("orders").orderBy("time","desc")
    .onSnapshot(snap=>{
        document.getElementById("orders").innerHTML="";
        snap.forEach(doc=>{
            let d=doc.data();
            document.getElementById("orders").innerHTML+=`
            <div class="box">
                <p><b class="gold">Name:</b> ${d.name}</p>
                <p><b class="gold">Phone:</b> ${d.phone}</p>
                <p><b class="gold">Composition:</b> ${d.product}</p>
                <p><b class="gold">Notes:</b> ${d.notes}</p>
                <button onclick="db.collection('orders').doc('${doc.id}').delete()" style="background:none; color:red; border:none; cursor:pointer;">[حذف]</button>
            </div>
            `;
        });
    });
}

load();
</script>

</body>
</html>
