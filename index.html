<!DOCTYPE html>
<html>
<head>
    <title>AZRAN ADMIN</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; }
        .box { border: 1px solid #333; padding: 15px; margin-bottom: 15px; border-radius: 8px; background: #111; transition: 0.3s; }
        .box:hover { border-color: gold; }
        .gold { color: gold; text-transform: uppercase; letter-spacing: 2px; }
        b { color: #aaa; margin-right: 5px; }
        .val { color: #fff; }
    </style>
</head>

<body>

<h1 class="gold">AZRAN ADMIN</h1>
<div id="orders">Loading orders...</div>

<script>
    // Replace these with your actual Firebase project credentials
    const firebaseConfig = {
        apiKey: "YOUR_KEY",
        authDomain: "YOUR_DOMAIN",
        projectId: "YOUR_ID",
    };

    // Initialize Firebase using the compat method
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function load() {
        // Listening to the 'orders' collection
        db.collection("orders").orderBy("time", "desc")
        .onSnapshot(snap => {
            const container = document.getElementById("orders");
            container.innerHTML = ""; // Clear current view

            if (snap.empty) {
                container.innerHTML = "<p>No orders found.</p>";
                return;
            }

            snap.forEach(doc => {
                let d = doc.data();
                // Building the HTML string
                container.innerHTML += `
                    <div class="box">
                        <p><b>Name:</b> <span class="val">${d.name || 'N/A'}</span></p>
                        <p><b>Phone:</b> <span class="val">${d.phone || 'N/A'}</span></p>
                        <p><b>Product:</b> <span class="val">${d.product || 'N/A'}</span></p>
                        <p><b>Notes:</b> <span class="val">${d.notes || 'None'}</span></p>
                    </div>
                `;
            });
        }, err => {
            console.error("Error fetching orders: ", err);
            document.getElementById("orders").innerHTML = "Error loading data. Check console.";
        });
    }

    load();
</script>

</body>
</html>
