<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AZRAN | Luxury E-Commerce</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
:root{
--gold:#d4af37;
--bg:#000;
--card:#111;
--text:#aaa;
}

body{
margin:0;
font-family:'Poppins',sans-serif;
background:radial-gradient(circle,#111,#000);
color:white;
}

header{
display:flex;
justify-content:space-between;
padding:20px;
border-bottom:1px solid #222;
position:sticky;
top:0;
background:#000;
z-index:10;
}

.logo{
font-family:'Cinzel';
color:var(--gold);
}

.nav button{
background:none;
border:none;
color:white;
margin-left:10px;
cursor:pointer;
}

.section{
padding:50px 20px;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
max-width:900px;
margin:auto;
}

.card{
background:var(--card);
padding:15px;
border:1px solid #222;
cursor:pointer;
transition:.3s;
}

.card:hover{
border-color:var(--gold);
transform:translateY(-5px);
}

.btn{
border:1px solid var(--gold);
color:var(--gold);
background:transparent;
padding:10px 20px;
cursor:pointer;
transition:.3s;
}

.btn:hover{
background:var(--gold);
color:#000;
}

/* CART */
.cart{
position:fixed;
right:0;
top:0;
width:300px;
height:100%;
background:#111;
padding:20px;
overflow:auto;
display:none;
}

.cart h3{
color:var(--gold);
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
background:#000;
border:1px solid #333;
color:white;
}
</style>
</head>

<body>

<header>
<div class="logo">AZRAN</div>
<div class="nav">
<button onclick="show('home')">Home</button>
<button onclick="show('shop')">Shop</button>
<button onclick="show('custom')">Custom</button>
<button onclick="toggleCart()">Cart 🛒 (<span id="cartCount">0</span>)</button>
</div>
</header>

<!-- HOME -->
<div id="home" class="section">
<h1 style="font-family:Cinzel;color:var(--gold)">Wear Your Identity</h1>
<p style="color:#aaa">Luxury personalized perfume experience</p>
</div>

<!-- SHOP -->
<div id="shop" class="section" style="display:none;">
<h2 style="color:var(--gold)">Signature Collection</h2>

<div class="grid">
<div class="card" onclick="add('Midnight Oud')">Midnight Oud</div>
<div class="card" onclick="add('Royal Musk')">Royal Musk</div>
<div class="card" onclick="add('Velvet Amber')">Velvet Amber</div>
<div class="card" onclick="add('Dark Rose')">Dark Rose</div>
</div>
</div>

<!-- CUSTOM -->
<div id="custom" class="section" style="display:none;">
<h2 style="color:var(--gold)">Create Your Perfume</h2>

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone">
<input id="pname" placeholder="Perfume Name">

<select id="size">
<option>30ml</option>
<option>50ml</option>
<option>100ml</option>
</select>

<h3>Notes Selection</h3>

<div class="grid" id="notes"></div>

<button class="btn" onclick="addCustom()" style="margin-top:20px;">
Add Custom Perfume
</button>
</div>

<!-- CART -->
<div class="cart" id="cart">
<h3>Your Cart</h3>
<div id="cartItems"></div>

<hr>

<button class="btn" onclick="checkout()" style="width:100%;">
Checkout
</button>
</div>

<script>

let cart=[];

/* NAV */
function show(id){
document.getElementById("home").style.display="none";
document.getElementById("shop").style.display="none";
document.getElementById("custom").style.display="none";

document.getElementById(id).style.display="block";
}

/* CART */
function add(item){
cart.push(item);
updateCart();
}

function updateCart(){
document.getElementById("cartCount").innerText=cart.length;

let box=document.getElementById("cartItems");
box.innerHTML="";

cart.forEach(c=>{
let div=document.createElement("div");
div.innerText=c;
box.appendChild(div);
});
}

function toggleCart(){
let c=document.getElementById("cart");
c.style.display = c.style.display==="block"?"none":"block";
}

/* NOTES */
const notes=["Bergamot","Rose","Oud","Musk","Vanilla","Amber","Jasmine"];

let nbox=document.getElementById("notes");

notes.forEach(n=>{
let d=document.createElement("div");
d.className="card";
d.innerText=n;

d.onclick=function(){
this.classList.toggle("sel");
}

nbox.appendChild(d);
});

/* CUSTOM */
function addCustom(){

let selected=[...document.querySelectorAll("#notes .sel")]
.map(e=>e.innerText).join(", ");

cart.push("Custom Perfume: "+selected);

updateCart();
}

/* CHECKOUT */
function checkout(){

let msg="AZRAN ORDER:\n\n";

cart.forEach(c=>{
msg+=c+"\n";
});

let phone="213562103308";

window.open("https://wa.me/"+phone+"?text="+encodeURIComponent(msg));
}

</script>

</body>
</html>
