<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-tag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZRAN | Personalized Perfume</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cairo:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #d4af37; --black: #0a0a0a; --grey: #1a1a1a; --white: #ffffff; }
        body { background-color: var(--black); color: var(--white); font-family: 'Cairo', sans-serif; margin: 0; padding: 0; transition: 0.3s; }
        
        /* Language Switcher */
        .lang-switcher { position: fixed; top: 20px; left: 20px; z-index: 1000; display: flex; gap: 5px; }
        .lang-btn { background: #222; color: var(--gold); border: 1px solid var(--gold); padding: 5px 10px; cursor: pointer; border-radius: 4px; font-size: 0.8rem; }
        .lang-btn:hover { background: var(--gold); color: var(--black); }

        .main-container { width: 95%; max-width: 800px; margin: 60px auto 40px; padding: 30px; border: 1px solid #333; background: var(--grey); border-radius: 20px; box-shadow: 0 15px 50px rgba(0,0,0,0.8); text-align: center; }
        .brand-name { font-family: 'Cinzel', serif; color: var(--gold); font-size: 2.5rem; margin-bottom: 5px; letter-spacing: 6px; font-weight: 700; }
        .hidden { display: none !important; }
        
        .btn-azran { background: transparent; color: var(--gold); border: 2px solid var(--gold); padding: 14px 35px; font-size: 1.1rem; cursor: pointer; transition: 0.3s; text-transform: uppercase; font-weight: bold; margin-top: 25px; width: 100%; border-radius: 5px; }
        .btn-azran:hover { background: var(--gold); color: var(--black); box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }

        /* Accordion */
        .accordion-item { border: 1px solid #333; margin-bottom: 15px; border-radius: 12px; overflow: hidden; background: #151515; text-align: initial; }
        .accordion-header { background: #222; color: var(--gold); padding: 18px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-family: 'Cinzel'; font-weight: bold; }
        .accordion-content { display: none; padding: 20px; background: #1a1a1a; }
        .accordion-content.active { display: block; animation: fadeIn 0.5s ease; }

        /* Notes Grid */
        .notes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 15px; }
        .note-card { background: #222; border: 1px solid #444; padding: 10px; border-radius: 12px; cursor: pointer; transition: 0.3s; position: relative; text-align: center; }
        .note-card img { width: 65px; height: 65px; border-radius: 50%; object-fit: cover; margin-bottom: 8px; border: 2px solid #333; }
        .note-card span { display: block; font-size: 0.8rem; color: #ddd; }
        .note-card input { position: absolute; opacity: 0; }
        .note-card.selected { border-color: var(--gold); background: rgba(212, 175, 55, 0.1); }

        /* Inputs */
        .input-group { margin-bottom: 20px; text-align: initial; }
        label { color: var(--gold); display: block; margin-bottom: 8px; font-size: 0.95rem; }
        input, select, textarea { width: 100%; padding: 12px; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; font-family: 'Cairo'; }
        
        .logo-img { width: 220px; height: auto; margin-bottom: 15px; display: block; margin-left: auto; margin-right: auto; }
        .progress-bar { height: 4px; background: #333; margin: 25px 0; border-radius: 10px; width: 100%; }
        .progress-fill { height: 100%; background: var(--gold); width: 0%; transition: 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* LTR Support */
        [dir="ltr"] .lang-switcher { left: auto; right: 20px; }
        [dir="ltr"] .input-group, [dir="ltr"] .accordion-item { text-align: left; }
    </style>
</head>
<body>

    <div class="lang-switcher">
        <button class="lang-btn" onclick="setLanguage('ar')">العربية</button>
        <button class="lang-btn" onclick="setLanguage('en')">English</button>
        <button class="lang-btn" onclick="setLanguage('fr')">Français</button>
    </div>

                <div class="input-group" style="flex: 2;"><label id="lbl-phone">الهاتف</label><input type="tel" id="phone" placeholder="213XXXXXXXXX"></div>
            </div>
            <button class="btn-azran" id="btn-next1" onclick="goToStep(2)">التالي</button>
        </div>

        <!-- Step 2 -->
        <div id="step-2" class="hidden">
            <h2 id="txt-step2-title" style="color: var(--gold); font-family: 'Cinzel';">تفاصيل العطر</h2>
            <div class="input-group"><label id="lbl-pname">اسم العطر المبتكر</label><input type="text" id="p_name"></div>
            <div style="display: flex; gap: 10px;">

                <div class="input-group" style="flex: 1;"><label id="lbl-pqty">الكمية</label><input type="number" id="p_qty" value="1"></div>
            </div>
            <input type="text" id="p_size_other" class="hidden">
            <div class="input-group"><label id="lbl-plikes">تفضيلات عطرية</label><textarea id="p_likes" rows="2"></textarea></div>
            <button class="btn-azran" id="btn-next2" onclick="goToStep(3)">التالي: الهرم العطري</button>
        </div>

        <!-- Step 3 -->
        <div id="step-3" class="hidden">
            <h2 id="txt-step3-title" style="color: var(--gold); font-family: 'Cinzel';">بناء الهرم العطري</h2>
            <p id="txt-selection-info" style="color: #888; font-size: 0.8rem; margin-bottom: 15px;">(اختر 2-3 نوتات لكل طبقة)</p>

            <div class="accordion-item">
                <div class="accordion-header" onclick="toggleAcc('acc-top')"><span id="txt-top-head">الافتتاحية (Top Notes)</span><span>▼</span></div>
                <div id="acc-top" class="accordion-content active"><div class="notes-grid" id="grid-top"></div></div>
            </div>

            <div class="accordion-item">
                <div class="accordion-header" onclick="toggleAcc('acc-mid')"><span id="txt-mid-head">القلب (Heart Notes)</span><span>▼</span></div>
                <div id="acc-mid" class="accordion-content"><div class="notes-grid" id="grid-mid"></div></div>
            </div>

            <div class="accordion-item">
                <div class="accordion-header" onclick="toggleAcc('acc-base')"><span id="txt-base-head">القاعدة (Base Notes)</span><span>▼</span></div>
                <div id="acc-base" class="accordion-content"><div class="notes-grid" id="grid-base"></div></div>
            </div>

            <button class="btn-azran" id="btn-submit" onclick="finishAndSend()">إرسال الطلب</button>
        </div>
    </div>

    function populate(id, data, group) {
        const grid = document.getElementById(id);
        data.forEach(item => {
            const card = document.createElement('div');
            card.className = 'note-card';
            card.innerHTML = `<img src="${item.i}"><span>${item.n}</span><input type="checkbox" name="${group}" value="${item.n}">`;
            card.onclick = function() {
                const cb = this.querySelector('input');
                const count = document.querySelectorAll(`input[name="${group}"]:checked`).length;
                if(!cb.checked && count >= 3) { alert(langData[currentLang].alertLimit); return; }
                cb.checked = !cb.checked;
                this.classList.toggle('selected', cb.checked);
            };
            grid.appendChild(card);
        });
    }

    populate('grid-top', notes.top, 'top');
    populate('grid-mid', notes.mid, 'mid');
    populate('grid-base', notes.base, 'base');

    function toggleAcc(id) {
        document.querySelectorAll('.accordion-content').forEach(c => c.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function showForm() {
        document.getElementById('section-welcome').classList.add('hidden');
        document.getElementById('section-form').classList.remove('hidden');
        updateProgress(33);
    }

    function goToStep(s) {
        document.getElementById('step-1').classList.add('hidden');
        document.getElementById('step-2').classList.add('hidden');
        document.getElementById('step-3').classList.add('hidden');
        document.getElementById('step-' + s).classList.remove('hidden');
        updateProgress(s==2?66:100);
        window.scrollTo(0,0);
    }

    function updateProgress(v) { document.getElementById('fill').style.width = v + "%"; }
    function toggleOther(v) { document.getElementById('p_size_other').classList.toggle('hidden', v !== 'other'); }

    function finishAndSend() {
        const fullname = document.getElementById('fname').value + " " + document.getElementById('lname').value;
        const phone = document.getElementById('phone').value;
        const perf = document.getElementById('p_name').value;
        const size = document.getElementById('p_size').value == 'other' ? document.getElementById('p_size_other').value : document.getElementById('p_size').value;
        
        const getS = (g) => {
            const selected = Array.from(document.querySelectorAll(`input[name="${g}"]:checked`));
            return { count: selected.length, text: selected.map(c => c.value).join(", ") };
        };

        const t = getS('top'), m = getS('mid'), b = getS('base');

        if(t.count < 2 || m.count < 2 || b.count < 2) { 
            alert(langData[currentLang].alertLimit); return; 
        }

        let msg = `*New Order from AZRAN (${currentLang})*%0A*Name:* ${fullname}%0A*Phone:* ${phone}%0A*Perfume Name:* ${perf}%0A*Size:* ${size}%0A*Top Notes:* ${t.text}%0A*Heart Notes:* ${m.text}%0A*Base Notes:* ${b.text}`;

        // اكتب رقمك الحقيقي هنا مكان X
        const myNum = "213562103308"; 
        window.open(`https://wa.me/${myNum}?text=${msg}`, '_blank');
        
        document.getElementById('section-form').classList.add('hidden');
        document.getElementById('section-thanks').classList.remove('hidden');
    }
</script>
